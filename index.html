<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Roue - Groupes pédagogiques</title>
  <style>
    body {font-family: Arial; text-align:center; background:#f5f5f5;}
    canvas {margin-top:20px; border:2px solid #000;}
    select, button, input {margin:5px; padding:10px; font-size:14px;}
    .results {display:flex; justify-content:center; flex-wrap:wrap; margin-top:20px;}
    .card {background:#fff; border:2px solid #000; border-radius:8px; padding:10px; margin:10px; width:150px;}
    .card h4 {margin:5px 0;}
  </style>
</head>
<body>

<h2>Création de groupes (tirage sans remise)</h2>

<select id="classSelect">
  <option value="2remi.txt">2REMI</option>
  <option value="1log.txt">1LOG</option>
  <option value="1mcc.txt">1MCC</option>
  <option value="tagora.txt">TAGORA</option>
</select>

<button onclick="loadClass()">Charger classe</button>
<input type="file" id="fileInput" accept=".txt">
<button onclick="loadFromFile()">Charger fichier TXT</button>

<br>
<button onclick="tirageCouleurs()">Séance 1 : Couleurs</button>
<button onclick="tirageLettres()">Séance 2 : Lettres</button>

<canvas id="wheel" width="400" height="400"></canvas>
<button onclick="spin()">Tourner</button>

<div id="results" class="results"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let eleves = [];
let segments = [];

// Couleurs tranchées
const couleurs = ["#e74c3c","#27ae60","#2980b9","#f1c40f","#9b59b6"];
const nomsCouleurs = ["Rouge","Vert","Bleu","Jaune","Violet"];
const lettres = ["A","B","C","D"];

let groupesCouleurs = {};
let groupesFinal = {};

let startAngle = 0;
let arc = 0;

function drawWheel() {
  ctx.clearRect(0,0,400,400);

  if (segments.length === 0) {
    ctx.fillStyle = "#999";
    ctx.fillText("Charge une classe", 120, 200);
    return;
  }

  arc = Math.PI*2/segments.length;

  segments.forEach((s,i)=>{
    let angle = startAngle + i*arc;
    ctx.beginPath();
    ctx.fillStyle = couleurs[i % couleurs.length];
    ctx.moveTo(200,200);
    ctx.arc(200,200,200,angle,angle+arc);
    ctx.fill();

    ctx.save();
    ctx.translate(200,200);
    ctx.rotate(angle+arc/2);
    ctx.fillStyle="#000";
    ctx.textAlign="right";
    ctx.fillText(s,180,10);
    ctx.restore();
  });

  // flèche noire
  ctx.fillStyle = "#000";
  ctx.beginPath();
  ctx.moveTo(190,10);
  ctx.lineTo(210,10);
  ctx.lineTo(200,40);
  ctx.fill();
}

function spin(){
  if(segments.length===0){alert("Charge une liste");return;}

  let spins = Math.random()*3000+3000;
  let start = Date.now();

  function rotate(){
    let progress = Date.now()-start;
    startAngle += 0.3;
    drawWheel();
    if(progress<spins) requestAnimationFrame(rotate);
  }
  rotate();
}

function loadClass(){
  fetch(document.getElementById("classSelect").value)
  .then(r=>r.text())
  .then(t=>{
    eleves = t.split("\n").map(e=>e.trim()).filter(e=>e).slice(0,20);
    segments=[...eleves];
    drawWheel();
  });
}

function loadFromFile(){
  const file = document.getElementById("fileInput").files[0];
  if(!file){ alert("Choisir fichier"); return; }

  const reader = new FileReader();
  reader.onload = e=>{
    eleves = e.target.result.split("\n").map(e=>e.trim()).filter(e=>e).slice(0,20);
    segments=[...eleves];
    drawWheel();
  };
  reader.readAsText(file);
}

function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

function displayResults(data, labels){
  const container = document.getElementById("results");
  container.innerHTML = "";

  Object.keys(data).forEach((key,i)=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<h4>${labels[i]}</h4>` + data[key].map(e=>`<div>${e}</div>`).join("");
    container.appendChild(card);
  });
}

// Séance 1 : 5 groupes de 4 élèves
function tirageCouleurs(){
  if(eleves.length<20){ alert("Il faut 20 élèves"); return; }

  let melange = shuffle([...eleves]);
  groupesCouleurs = {0:[],1:[],2:[],3:[],4:[]};

  melange.forEach((e,i)=>{
    groupesCouleurs[i%5].push(e);
  });

  displayResults(groupesCouleurs, nomsCouleurs);
}

// Séance 2 : 4 groupes de 5 élèves
function tirageLettres(){
  if(eleves.length<20){ alert("Il faut 20 élèves"); return; }

  let melange = shuffle([...eleves]);
  groupesFinal = {A:[],B:[],C:[],D:[]};

  melange.forEach((e,i)=>{
    let lettre = lettres[i%4];
    groupesFinal[lettre].push(e);
  });

  displayResults(groupesFinal, lettres);
}

// init
drawWheel();

</script>

</body>
</html>
